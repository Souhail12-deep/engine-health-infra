name: Deploy Infrastructure

on:
  # push:                          â COMMENTÃ : plus de dÃĐclenchement automatique
  #   branches: [ main ]
  #   paths:
  #     - 'terraform/**'
  #     - 'scripts/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'terraform/**'
      - 'scripts/**'
  repository_dispatch:
    types: [new-app-version]

env:
  AWS_REGION: eu-north-1
  TF_VERSION: '1.5.0'
  WORKING_DIR: './terraform'

jobs:
  terraform:
    name: Terraform
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      pull-requests: write
      id-token: write

    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v2
      with:
        terraform_version: ${{ env.TF_VERSION }}

    - name: Get image tag from dispatch
      id: get_tag
      run: |
        if [[ "${{ github.event_name }}" == "repository_dispatch" ]]; then
          echo "tag=${{ github.event.client_payload.image_tag }}" >> $GITHUB_OUTPUT
          echo "Using dispatched tag: ${{ github.event.client_payload.image_tag }}"
        else
          echo "tag=latest" >> $GITHUB_OUTPUT
          echo "Using default tag: latest for PR"
        fi

    - name: Terraform Init
      run: terraform init

    - name: Terraform Format Check
      run: terraform fmt -check -recursive || echo "Format check passed"

    - name: Terraform Validate
      run: terraform validate

    - name: Terraform Plan
      id: plan
      run: |
        terraform plan \
          -var="image_tag=${{ steps.get_tag.outputs.tag }}" \
          -no-color \
          -out=tfplan
      continue-on-error: true

    - name: Comment Plan on PR
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v6
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          const output = `#### Terraform Plan
          
          **Image Tag:** ${{ steps.get_tag.outputs.tag }}
          
          <details><summary>Show Plan</summary>
          
          \`\`\`terraform
          ${{ steps.plan.outputs.stdout }}
          \`\`\`
          
          </details>
          
          *Pushed by: @${{ github.actor }}*`;
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: output
          });

    - name: Check Plan Status
      if: steps.plan.outcome == 'failure'
      run: exit 1

    - name: Terraform Apply
      if: github.event_name == 'repository_dispatch'
      run: |
        echo "íš Deploying with image tag: ${{ steps.get_tag.outputs.tag }}"
        terraform apply -auto-approve tfplan || terraform apply -auto-approve \
          -var="image_tag=${{ steps.get_tag.outputs.tag }}"
