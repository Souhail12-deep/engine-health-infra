name: Deploy Infrastructure

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Docker image tag to deploy'
        required: true
        default: 'latest'
  repository_dispatch:
    types: [new-app-version]

env:
  AWS_REGION: eu-north-1
  TF_VERSION: '1.5.0'

jobs:
  # ==================== BLOCK 1: TERRAFORM INIT ====================
  terraform-init:
    name: í´§ Terraform Init
    runs-on: ubuntu-latest
    outputs:
      working_dir: ${{ steps.set_dir.outputs.dir }}
      image_tag: ${{ steps.get_tag.outputs.tag }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Get image tag
      id: get_tag
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          echo "tag=${{ github.event.inputs.image_tag }}" >> $GITHUB_OUTPUT
        else
          echo "tag=${{ github.event.client_payload.image_tag }}" >> $GITHUB_OUTPUT
        fi
        echo "Using image tag: ${{ steps.get_tag.outputs.tag }}"
    
    - name: Set working directory
      id: set_dir
      run: |
        echo "dir=terraform/prod" >> $GITHUB_OUTPUT
        echo "Working directory: terraform/prod"
    
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}
    
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ env.TF_VERSION }}
    
    - name: Terraform Init
      working-directory: ${{ steps.set_dir.outputs.dir }}
      run: |
        terraform init
        echo "âś… Terraform initialized successfully"

  # ==================== BLOCK 2: TERRAFORM PLAN ====================
  terraform-plan:
    name: íł‹ Terraform Plan
    runs-on: ubuntu-latest
    needs: terraform-init
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}
    
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ env.TF_VERSION }}
    
    - name: Terraform Plan
      working-directory: terraform/prod
      run: |
        terraform plan \
          -var="image_tag=${{ needs.terraform-init.outputs.image_tag }}" \
          -no-color \
          -out=tfplan
        echo "âś… Terraform plan created"
    
    - name: Upload plan artifact
      uses: actions/upload-artifact@v4
      with:
        name: terraform-plan
        path: terraform/prod/tfplan
        retention-days: 1

  # ==================== BLOCK 3: TERRAFORM APPLY ====================
  terraform-apply:
    name: íş€ Terraform Apply
    runs-on: ubuntu-latest
    needs: terraform-plan
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}
    
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ env.TF_VERSION }}
    
    - name: Download plan artifact
      uses: actions/download-artifact@v4
      with:
        name: terraform-plan
        path: terraform/prod
    
    - name: Terraform Apply
      working-directory: terraform/prod
      run: |
        terraform apply -auto-approve tfplan
        echo "âś… Infrastructure deployed successfully"
    
    - name: Get deployment outputs
      id: outputs
      working-directory: terraform/prod
      run: |
        ALB_DNS=$(terraform output -raw alb_dns_name 2>/dev/null || echo "N/A")
        echo "alb_dns=$ALB_DNS" >> $GITHUB_OUTPUT
        echo "========================================="
        echo "âś… Deployment completed!"
        echo "   ALB DNS: $ALB_DNS"
        echo "========================================="
