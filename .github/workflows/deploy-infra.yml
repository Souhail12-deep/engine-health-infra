name: Deploy Infrastructure

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Docker image tag to deploy'
        required: true
        default: 'latest'
  repository_dispatch:
    types: [new-app-version]

env:
  AWS_REGION: eu-north-1
  TF_VERSION: '1.5.0'

jobs:
  # ==================== JOB 1: TERRAFORM INIT ====================
  init:
    name: 1️⃣ Terraform Init
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.get_tag.outputs.tag }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Get image tag
      id: get_tag
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          echo "tag=${{ github.event.inputs.image_tag }}" >> $GITHUB_OUTPUT
        else
          echo "tag=${{ github.event.client_payload.image_tag }}" >> $GITHUB_OUTPUT
        fi
        echo "Image tag: ${{ steps.get_tag.outputs.tag }}"
    
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}
    
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ env.TF_VERSION }}
    
    - name: Terraform Init
      run: |
        cd terraform/prod
        terraform init
        echo "✅ Terraform Init completed"

  # ==================== JOB 2: TERRAFORM PLAN ====================
  plan:
    name: 2️⃣ Terraform Plan
    runs-on: ubuntu-latest
    needs: init
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}
    
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ env.TF_VERSION }}
    
    - name: Terraform Plan
      run: |
        cd terraform/prod
        terraform plan \
          -var="image_tag=${{ needs.init.outputs.image_tag }}" \
          -no-color \
          -out=tfplan
        echo "✅ Terraform Plan completed"
    
    - name: Upload plan
      uses: actions/upload-artifact@v4
      with:
        name: tfplan
        path: terraform/prod/tfplan
        retention-days: 1

  # ==================== JOB 3: TERRAFORM APPLY ====================
  apply:
    name: 3️⃣ Terraform Apply
    runs-on: ubuntu-latest
    needs: plan
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}
    
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ env.TF_VERSION }}
    
    - name: Download plan
      uses: actions/download-artifact@v4
      with:
        name: tfplan
        path: terraform/prod
    
    - name: Terraform Apply
      run: |
        cd terraform/prod
        terraform apply -auto-approve tfplan
        echo "✅ Terraform Apply completed"
    
    - name: Get ALB DNS
      run: |
        cd terraform/prod
        ALB_DNS=$(terraform output -raw alb_dns_name 2>/dev/null || echo "N/A")
        echo "========================================="
        echo "✅ Infrastructure deployed!"
        echo "   ALB DNS: $ALB_DNS"
        echo "========================================="
