name: Deploy Infrastructure

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Docker image tag to deploy'
        required: true
        default: 'latest'
  repository_dispatch:
    types: [new-app-version]

env:
  AWS_REGION: eu-north-1
  TF_VERSION: '1.5.0'
  WORKING_DIR: './terraform'

jobs:
  # ==================== JOB 1: PLAN ====================
  plan:
    name: íł‹ Terraform Plan
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Get image tag
      id: get_tag
      run: |
        if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
          echo "tag=${{ github.event.inputs.image_tag }}" >> $GITHUB_OUTPUT
        else
          echo "tag=${{ github.event.client_payload.image_tag }}" >> $GITHUB_OUTPUT
        fi

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ env.TF_VERSION }}

    - name: Terraform Init
      working-directory: ${{ env.WORKING_DIR }}
      run: terraform init

    - name: Terraform Plan
      working-directory: ${{ env.WORKING_DIR }}
      run: |
        terraform plan \
          -var="image_tag=${{ steps.get_tag.outputs.tag }}" \
          -var="s3_bucket_name=engine-health-models-20260304-112538-28227" \
          -no-color \
          -out=tfplan

    - name: Upload plan
      uses: actions/upload-artifact@v4
      with:
        name: tfplan
        path: ${{ env.WORKING_DIR }}/tfplan

  # ==================== JOB 2: APPLY ====================
  apply:
    name: íş€ Terraform Apply
    runs-on: ubuntu-latest
    needs: plan
    environment: production
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Get image tag
      id: get_tag
      run: |
        if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
          echo "tag=${{ github.event.inputs.image_tag }}" >> $GITHUB_OUTPUT
        else
          echo "tag=${{ github.event.client_payload.image_tag }}" >> $GITHUB_OUTPUT
        fi

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ env.TF_VERSION }}

    - name: Terraform Init
      working-directory: ${{ env.WORKING_DIR }}
      run: terraform init

    - name: Download plan
      uses: actions/download-artifact@v4
      with:
        name: tfplan
        path: ${{ env.WORKING_DIR }}

    - name: Terraform Apply
      working-directory: ${{ env.WORKING_DIR }}
      run: terraform apply -auto-approve tfplan

    - name: Get ALB DNS
      working-directory: ${{ env.WORKING_DIR }}
      run: |
        ALB_DNS=$(terraform output -raw alb_dns_name 2>/dev/null || echo "N/A")
        echo "âś… Deployed! ALB: $ALB_DNS"
