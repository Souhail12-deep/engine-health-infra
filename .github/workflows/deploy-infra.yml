name: Deploy Infrastructure

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Docker image tag'
        required: true
        default: 'latest'
  repository_dispatch:
    types: [new-app-version]

jobs:
  PLAN:
    name: Ú° Terraform Plan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-north-1
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.0
      - name: Get tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "TAG=${{ github.event.inputs.image_tag }}" >> $GITHUB_ENV
          else
            echo "TAG=${{ github.event.client_payload.image_tag }}" >> $GITHUB_ENV
          fi
      - name: Init
        run: cd terraform && terraform init
      - name: Plan
        run: cd terraform && terraform plan -var="image_tag=${{ env.TAG }}" -out=tfplan
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: terraform/tfplan

  APPLY:
    name: Ú¤ Terraform Apply
    runs-on: ubuntu-latest
    needs: PLAN
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-north-1
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.0
      - name: Get tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "TAG=${{ github.event.inputs.image_tag }}" >> $GITHUB_ENV
          else
            echo "TAG=${{ github.event.client_payload.image_tag }}" >> $GITHUB_ENV
          fi
      - name: Init
        run: cd terraform && terraform init
      - name: Download
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: terraform
      - name: Apply
        run: cd terraform && terraform apply -auto-approve tfplan
