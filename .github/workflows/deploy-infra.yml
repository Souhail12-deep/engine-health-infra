name: Deploy Infrastructure

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Docker image tag to deploy'
        required: true
        default: 'latest'
      environment:
        description: 'Environment (dev/prod)'
        required: true
        default: 'prod'
  repository_dispatch:
    types: [new-app-version]

env:
  AWS_REGION: eu-north-1
  TF_VERSION: '1.5.0'

jobs:
  # ==================== STAGE 1: SETUP ====================
  setup:
    name: Setup Environment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.get_env.outputs.environment }}
      image_tag: ${{ steps.get_tag.outputs.tag }}
      working_dir: ${{ steps.set_dir.outputs.dir }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Get environment
      id: get_env
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          echo "environment=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
        else
          echo "environment=${{ github.event.client_payload.environment }}" >> $GITHUB_OUTPUT
        fi
        echo "Environment: ${{ steps.get_env.outputs.environment }}"
    
    - name: Get image tag
      id: get_tag
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          echo "tag=${{ github.event.inputs.image_tag }}" >> $GITHUB_OUTPUT
        else
          echo "tag=${{ github.event.client_payload.image_tag }}" >> $GITHUB_OUTPUT
        fi
        echo "Image tag: ${{ steps.get_tag.outputs.tag }}"
    
    - name: Set working directory
      id: set_dir
      run: |
        if [ "${{ steps.get_env.outputs.environment }}" = "dev" ]; then
          echo "dir=terraform/dev" >> $GITHUB_OUTPUT
        else
          echo "dir=terraform/prod" >> $GITHUB_OUTPUT
        fi
        echo "Working directory: ${{ steps.set_dir.outputs.dir }}"

  # ==================== STAGE 2: TERRAFORM INIT ====================
  terraform-init:
    name: Terraform Init
    runs-on: ubuntu-latest
    needs: setup
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}
    
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ env.TF_VERSION }}
    
    - name: Terraform Init
      working-directory: ${{ needs.setup.outputs.working_dir }}
      run: |
        terraform init
        echo "âś… Terraform initialized"

  # ==================== STAGE 3: TERRAFORM VALIDATE ====================
  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    needs: [setup, terraform-init]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}
    
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ env.TF_VERSION }}
    
    - name: Terraform Validate
      working-directory: ${{ needs.setup.outputs.working_dir }}
      run: |
        terraform validate
        echo "âś… Terraform validation passed"

  # ==================== STAGE 4: TERRAFORM PLAN ====================
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: [setup, terraform-validate]
    outputs:
      has_changes: ${{ steps.plan.outputs.has_changes }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}
    
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ env.TF_VERSION }}
    
    - name: Terraform Plan
      id: plan
      working-directory: ${{ needs.setup.outputs.working_dir }}
      run: |
        terraform plan \
          -var="image_tag=${{ needs.setup.outputs.image_tag }}" \
          -var="environment=${{ needs.setup.outputs.environment }}" \
          -no-color \
          -out=tfplan 2>&1 | tee plan_output.txt
        
        if grep -q "No changes" plan_output.txt; then
          echo "has_changes=false" >> $GITHUB_OUTPUT
          echo "âš ď¸Ź No infrastructure changes detected"
        else
          echo "has_changes=true" >> $GITHUB_OUTPUT
          echo "íłť Infrastructure changes detected"
        fi
    
    - name: Upload plan artifact
      uses: actions/upload-artifact@v4
      with:
        name: terraform-plan
        path: ${{ needs.setup.outputs.working_dir }}/tfplan
        retention-days: 1

  # ==================== STAGE 5: MANUAL APPROVAL (PROD ONLY) ====================
  manual-approval:
    name: Manual Approval for Production
    runs-on: ubuntu-latest
    needs: [setup, terraform-plan]
    if: needs.setup.outputs.environment == 'prod' && needs.terraform-plan.outputs.has_changes == 'true'
    environment: production
    
    steps:
    - name: Wait for approval
      run: |
        echo "========================================="
        echo "âŹł Waiting for manual approval..."
        echo "   Environment: PRODUCTION"
        echo "   Image tag: ${{ needs.setup.outputs.image_tag }}"
        echo "========================================="

  # ==================== STAGE 6: TERRAFORM APPLY ====================
  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: [setup, terraform-plan, manual-approval]
    if: |
      (needs.setup.outputs.environment == 'prod' && needs.manual-approval.result == 'success') ||
      (needs.setup.outputs.environment == 'dev' && needs.terraform-plan.outputs.has_changes == 'true')
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}
    
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ env.TF_VERSION }}
    
    - name: Download plan artifact
      uses: actions/download-artifact@v4
      with:
        name: terraform-plan
        path: ${{ needs.setup.outputs.working_dir }}
    
    - name: Terraform Apply
      working-directory: ${{ needs.setup.outputs.working_dir }}
      run: |
        echo "íş€ Applying Terraform plan for ${{ needs.setup.outputs.environment }}..."
        terraform apply -auto-approve tfplan
        echo "âś… Infrastructure deployment completed"
    
    - name: Deployment Info
      run: |
        echo "========================================="
        echo "âś… Infrastructure deployed successfully"
        echo "   Environment: ${{ needs.setup.outputs.environment }}"
        echo "   Image tag: ${{ needs.setup.outputs.image_tag }}"
        echo "========================================="

  # ==================== STAGE 7: POST-DEPLOYMENT VERIFICATION ====================
  verify-deployment:
    name: Verify Deployment
    runs-on: ubuntu-latest
    needs: [setup, terraform-apply]
    if: success()
    
    steps:
    - name: Get ALB DNS
      id: alb
      working-directory: ${{ needs.setup.outputs.working_dir }}
      run: |
        ALB_DNS=$(terraform output -raw alb_dns_name 2>/dev/null || echo "N/A")
        echo "dns=$ALB_DNS" >> $GITHUB_OUTPUT
        echo "ALB DNS: $ALB_DNS"
    
    - name: Wait for application
      if: steps.alb.outputs.dns != 'N/A'
      run: |
        ALB_URL="http://${{ steps.alb.outputs.dns }}/health"
        echo "Checking health endpoint: $ALB_URL"
        
        for i in {1..30}; do
          if curl -f -s -o /dev/null "$ALB_URL"; then
            echo "âś… Application is healthy!"
            exit 0
          fi
          echo "Waiting for app... ($i/30)"
          sleep 10
        done
        echo "âťŚ Application failed to become healthy"
        exit 1
