name: Deploy Infrastructure

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Docker image tag to deploy'
        required: true
        default: 'latest'
  repository_dispatch:
    types: [new-app-version]

env:
  AWS_REGION: eu-north-1
  TF_VERSION: '1.5.0'
  WORKING_DIR: './terraform'

jobs:
  # ==================== STAGE 1: TERRAFORM INIT ====================
  terraform-init:
    name: í´§ Terraform Init
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.get_tag.outputs.tag }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Get image tag
      id: get_tag
      run: |
        if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
          echo "tag=${{ github.event.inputs.image_tag }}" >> $GITHUB_OUTPUT
          echo "Using manual tag: ${{ github.event.inputs.image_tag }}"
        else
          echo "tag=${{ github.event.client_payload.image_tag }}" >> $GITHUB_OUTPUT
          echo "Using dispatched tag: ${{ github.event.client_payload.image_tag }}"
        fi

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ env.TF_VERSION }}

    - name: Terraform Init
      working-directory: ${{ env.WORKING_DIR }}
      run: |
        terraform init
        echo "âś… Terraform Init completed successfully"

  # ==================== STAGE 2: TERRAFORM PLAN ====================
  terraform-plan:
    name: íł‹ Terraform Plan
    runs-on: ubuntu-latest
    needs: terraform-init
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ env.TF_VERSION }}

    - name: Terraform Init (Plan Stage)
      working-directory: ${{ env.WORKING_DIR }}
      run: |
        terraform init
        echo "âś… Terraform Init completed for Plan stage"

    - name: Terraform Plan
      id: plan
      working-directory: ${{ env.WORKING_DIR }}
      run: |
        terraform plan \
          -var="image_tag=${{ needs.terraform-init.outputs.image_tag }}" \
          -var="s3_bucket_name=engine-health-models-20260304-112538-28227" \
          -no-color \
          -out=tfplan
        echo "âś… Terraform Plan completed successfully"

    - name: Upload Plan Artifact
      uses: actions/upload-artifact@v4
      with:
        name: tfplan
        path: ${{ env.WORKING_DIR }}/tfplan
        retention-days: 1

  # ==================== STAGE 3: MANUAL APPROVAL (PRODUCTION GATE) ====================
  manual-approval:
    name: âŹ¸ď¸Ź Manual Approval Required
    runs-on: ubuntu-latest
    needs: terraform-plan
    environment: production
    steps:
    - name: Wait for approval
      run: |
        echo "========================================="
        echo "âŹł Manual approval required for production"
        echo "   Image tag: ${{ needs.terraform-init.outputs.image_tag }}"
        echo "   Please approve or reject in GitHub"
        echo "========================================="

  # ==================== STAGE 4: TERRAFORM APPLY ====================
  terraform-apply:
    name: íş€ Terraform Apply
    runs-on: ubuntu-latest
    needs: [terraform-plan, manual-approval]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ env.TF_VERSION }}

    - name: Terraform Init (Apply Stage)
      working-directory: ${{ env.WORKING_DIR }}
      run: |
        terraform init
        echo "âś… Terraform Init completed for Apply stage"

    - name: Download Plan Artifact
      uses: actions/download-artifact@v4
      with:
        name: tfplan
        path: ${{ env.WORKING_DIR }}

    - name: Terraform Apply
      working-directory: ${{ env.WORKING_DIR }}
      run: |
        echo "íş€ Applying Terraform plan..."
        terraform apply -auto-approve tfplan
        echo "âś… Terraform Apply completed successfully"

    - name: Get Deployment Outputs
      id: outputs
      working-directory: ${{ env.WORKING_DIR }}
      run: |
        ALB_DNS=$(terraform output -raw alb_dns_name 2>/dev/null || echo "N/A")
        echo "alb_dns=$ALB_DNS" >> $GITHUB_OUTPUT
        echo "========================================="
        echo "âś… Infrastructure deployed successfully!"
        echo "   Image tag: ${{ needs.terraform-init.outputs.image_tag }}"
        echo "   ALB DNS: $ALB_DNS"
        echo "========================================="

